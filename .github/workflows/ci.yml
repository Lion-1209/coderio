name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check (lint)
        run: ruff check src tests
      - name: Ruff format check
        # --check only verifies, doesn't modify files. Fails if any file
        # isn't formatted — catches "forgot to format" in PRs.
        run: ruff format --check src tests

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    env:
      # Windows runners default to cp1252; Rich/Textual output contains CJK
      # text (Chinese UI strings) that charmap can't encode. Force UTF-8 so
      # `coderio --help` and subprocess-based tests don't crash with
      # UnicodeEncodeError on windows-latest.
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        shell: bash
        run: |
          python -m pytest -q

      - name: Build wheel (smoke)
        shell: bash
        run: |
          python -m pip wheel --no-deps . -w /tmp/wheel-test
          echo "Wheel built successfully"
