name: Release

# Triggered by pushing a tag like v0.1.0. Builds a wheel and attaches it
# to a GitHub Release, so users can `pip install coderio-*.whl` without
# cloning the repo or going through PyPI.
#
# To cut a release:
#   git tag v0.1.0
#   git push origin v0.1.0

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write  # needed to create the release + upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel
          # Verify the wheel is importable in a fresh venv.
          ls -la dist/*.whl

      - name: Create GitHub Release + attach wheel
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*.whl
