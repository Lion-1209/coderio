name: Release

# Triggered by pushing a tag like v0.1.0. Builds a wheel and attaches it
# to a GitHub Release, so users can `pip install coderio-*.whl` without
# cloning the repo or going through PyPI.
#
# To cut a release:
#   git tag v0.1.0
#   git push origin v0.1.0

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write  # needed to create the release + upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel

      - name: Verify wheel in clean venv
        # ACTUALLY install the wheel in a fresh venv and run coderio --help.
        # This catches missing entry points, broken imports, missing bundled
        # resources (skills), and packaging regressions — not just 'file exists'.
        run: |
          python -m venv /tmp/wheel-test-venv
          /tmp/wheel-test-venv/bin/pip install --no-deps dist/*.whl
          /tmp/wheel-test-venv/bin/pip install typer rich textual langchain langchain-core
          /tmp/wheel-test-venv/bin/coderio --help
          # Verify bundled skills are importable from the installed package.
          /tmp/wheel-test-venv/bin/python -c "
          from coderio.skills.store import load_skill_store
          from pathlib import Path
          import coderio
          pkg = Path(coderio.__file__).parent / 'skills'
          store = load_skill_store(pkg, 0, None)
          assert len(store.skills) > 0, 'no bundled skills found'
          print(f'{len(store.skills)} bundled skills OK')
          "

      - name: Create GitHub Release + attach wheel
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*.whl
