<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Roguelike Dungeon</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; color: #e0e0e0; font-family: 'Courier New', monospace; overflow: hidden; }
#gameCanvas { display: block; background: #000; image-rendering: pixelated; }
#ui { position: absolute; top: 10px; left: 10px; pointer-events: none; }
.panel { background: rgba(0,0,0,0.85); border: 2px solid #444; padding: 10px 14px; margin-bottom: 8px; font-size: 14px; }
.hp-bar { width: 160px; height: 12px; background: #333; border: 1px solid #555; margin-top: 4px; }
.hp-fill { height: 100%; background: #c0392b; transition: width 0.2s; }
.stat { margin: 3px 0; }
.stat-label { color: #888; }
.stat-value { color: #f1c40f; font-weight: bold; }
#log { position: absolute; bottom: 10px; left: 10px; width: 420px; max-height: 180px; overflow-y: auto; background: rgba(0,0,0,0.85); border: 2px solid #444; padding: 8px; font-size: 12px; pointer-events: none; }
.log-entry { margin: 2px 0; opacity: 0; animation: fadeIn 0.3s forwards; }
@keyframes fadeIn { to { opacity: 1; } }
.msg-damage { color: #e74c3c; }
.msg-heal { color: #2ecc71; }
.msg-item { color: #3498db; }
.msg-floor { color: #f39c12; }
.msg-info { color: #aaa; }
#screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); }
.screen-content { text-align: center; }
.screen-title { font-size: 48px; margin-bottom: 20px; text-shadow: 0 0 20px currentColor; }
.screen-subtitle { font-size: 18px; margin-bottom: 30px; color: #aaa; }
.btn { background: #2c3e50; color: #ecf0f1; border: 2px solid #34495e; padding: 12px 32px; font-size: 18px; font-family: inherit; cursor: pointer; margin: 8px; transition: all 0.2s; }
.btn:hover { background: #34495e; border-color: #3498db; transform: scale(1.05); }
#controls { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.7); padding: 8px 12px; font-size: 11px; color: #666; border: 1px solid #333; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ui" style="display:none;">
  <div class="panel">
    <div class="stat"><span class="stat-label">❤ HP </span><span class="stat-value" id="hpText">20/20</span></div>
    <div class="hp-bar"><div class="hp-fill" id="hpBar"></div></div>
    <div class="stat"><span class="stat-label">⚔ ATK </span><span class="stat-value" id="atkText">2</span></div>
    <div class="stat"><span class="stat-label">🛡 DEF </span><span class="stat-value" id="defText">0</span></div>
    <div class="stat"><span class="stat-label">🏃 SPD </span><span class="stat-value" id="spdText">1.0</span></div>
    <div class="stat"><span class="stat-label">🏢 Floor </span><span class="stat-value" id="floorText">1</span></div>
    <div class="stat"><span class="stat-label">💀 Kills </span><span class="stat-value" id="killsText">0</span></div>
  </div>
</div>
<div id="log"></div>
<div id="controls">WASD / Arrows: Move & Attack | Space: Wait | G: Pickup</div>
<div id="screen">
  <div class="screen-content">
    <div class="screen-title" style="color:#c0392b;">DUNGEON OF CHAOS</div>
    <div class="screen-subtitle">A Roguelike Adventure</div>
    <button class="btn" onclick="startGame()">Enter Dungeon</button>
  </div>
</div>
<script src="game.js"></script>
</body>
</html>
